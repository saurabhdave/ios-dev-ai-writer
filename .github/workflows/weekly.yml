name: Weekly iOS Article Generator

on:
  # Run automatically every Monday and Thursday at 10:00 UTC.
  schedule:
    - cron: "0 10 * * 1,4"
  # Also allow manual runs from the GitHub Actions tab, with override knobs.
  workflow_dispatch:
    inputs:
      forced_topic:
        description: "Override the generated title (max 60 chars). Leave blank to let the pipeline decide."
        type: string
        required: false
        default: ""
      forced_family:
        description: "Force a topic family. 'auto' = use the weighted sampler."
        type: choice
        required: false
        default: auto
        options:
          - auto
          - architecture
          - performance
          - concurrency
          - swiftui_features
          - tooling_debugging
          - frameworks_apis
          - accessibility_design
          - migration
      dry_run:
        description: "Run the pipeline but skip git persistence and publishing to the content repo."
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  issues: write

jobs:
  generate-article:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Generate weekly article
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-5-mini
          OPENAI_TEMPERATURE: "0.7"
          # Manual overrides from workflow_dispatch. Empty / "auto" means no override.
          FORCED_TOPIC: ${{ github.event.inputs.forced_topic }}
          FORCED_FAMILY: ${{ github.event.inputs.forced_family }}
        run: python main.py

      - name: Write run summary
        if: always()
        run: |
          python - <<'EOF'
          import json, os
          summary_path = "outputs/run_summary.json"
          if not os.path.exists(summary_path):
              print("No run summary found.")
              exit(0)
          with open(summary_path) as f:
              s = json.load(f)
          dash = "\u2014"
          lines = [
              f"## Pipeline run \u2014 {s.get('date', 'unknown')}",
              "| Field | Value |",
              "|---|---|",
              f"| Topic | {s.get('topic') or dash} |",
              f"| Word count | {s.get('article_word_count') or dash} |",
              f"| Codegen path | {s.get('codegen_path') or dash} |",
              f"| Repair attempts | {s.get('codegen_repair_attempts', 0)} |",
              f"| Editor passes | {s.get('editor_passes', 0)} |",
              f"| Voice pass | {'yes' if s.get('voice_pass') else 'no'} |",
              f"| Newsletter | {'yes' if s.get('newsletter_enabled') else 'no'} |",
              f"| Quarantine | {'triggered' if s.get('quarantine_triggered') else 'clean'} |",
          ]
          md = "\n".join(lines) + "\n"
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
              f.write(md)
          print("Summary written.")
          EOF

      - name: Regenerate Pipeline Health section in README
        if: github.event.inputs.dry_run != 'true'
        run: python scripts/update_readme.py

      - name: Commit and push generated content
        id: persist-state
        if: github.event.inputs.dry_run != 'true'
        run: |
          CHANGED_FILES=""
          if [ -n "$(git status --porcelain .newsletter_issue_number)" ]; then
            CHANGED_FILES="${CHANGED_FILES} .newsletter_issue_number"
          fi
          if [ -n "$(git status --porcelain outputs/quality_history.json)" ]; then
            CHANGED_FILES="${CHANGED_FILES} outputs/quality_history.json"
          fi
          if [ -n "$(git status --porcelain outputs/quality_history_meta.json)" ]; then
            CHANGED_FILES="${CHANGED_FILES} outputs/quality_history_meta.json"
          fi
          if [ -n "$(git status --porcelain memory/family_picks.json)" ]; then
            CHANGED_FILES="${CHANGED_FILES} memory/family_picks.json"
          fi
          if [ -n "$(git status --porcelain README.md)" ]; then
            CHANGED_FILES="${CHANGED_FILES} README.md"
          fi
          if [ -n "${CHANGED_FILES}" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -f ${CHANGED_FILES}
            git commit -m "chore: persist newsletter counter, quality history, family rotation, and pipeline health"
            git pull --rebase
            git push
          else
            echo "No state files changed."
          fi

      - name: Check pipeline health
        id: health
        if: github.event.inputs.dry_run != 'true'
        continue-on-error: true
        run: python scripts/health_check.py

      - name: File health-regression issue
        if: steps.health.outcome == 'failure' && github.event.inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Dedupe: if an open issue with this label exists, comment on it instead
          # of filing a new one — prevents two-issues-per-week spam during a regression run.
          EXISTING=$(gh issue list \
            --label pipeline-health-regression \
            --state open \
            --json number \
            --jq 'length')
          gh label create pipeline-health-regression \
            --color "fbca04" \
            --description "Auto-created when the post-run health check trips a threshold" \
            2>/dev/null || true
          if [ "$EXISTING" -gt 0 ]; then
            ISSUE=$(gh issue list --label pipeline-health-regression --state open --json number --jq '.[0].number')
            echo "Open health-regression issue #${ISSUE} already exists; appending today's snapshot."
            gh issue comment "$ISSUE" --body-file outputs/health_regression.md
          else
            gh issue create \
              --title "Pipeline health regression — $(date -u +%Y-%m-%d)" \
              --body-file outputs/health_regression.md \
              --label pipeline-health-regression
          fi

      - name: Publish articles to content repo
        if: steps.persist-state.outcome == 'success' && github.event.inputs.dry_run != 'true'
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          git clone https://x-access-token:${DEPLOY_TOKEN}@github.com/saurabhdave/ios-ai-articles.git _content
          mkdir -p _content/articles _content/linkedin _content/codegen _content/newsletter
          for src in outputs/articles/*.md; do
            [ -f "$src" ] || continue
            fname=$(basename "$src")
            date_prefix=$(echo "$fname" | grep -oE '^[0-9]{4}-[0-9]{2}-[0-9]{2}')
            if [ -n "$date_prefix" ]; then
              for existing in _content/articles/${date_prefix}-*.md; do
                [ -f "$existing" ] || continue
                if [ "$(basename "$existing")" != "$fname" ]; then
                  echo "Replacing same-date article: $(basename "$existing") -> $fname"
                  rm "$existing"
                fi
              done
            fi
            cp "$src" _content/articles/
          done
          find outputs/linkedin -maxdepth 1 -type f -name '*.md' -exec cp {} _content/linkedin/ \; || true
          find outputs/codegen -maxdepth 1 -type f -name '*.json' -exec cp {} _content/codegen/ \; || true
          find outputs/newsletter -maxdepth 1 -type f \( -name '*.md' -o -name '*.html' \) -exec cp {} _content/newsletter/ \; || true
          rm -f _content/newsletter/.issue_number
          cd _content
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A articles/ linkedin/ codegen/ newsletter/
          git diff --staged --quiet || git commit -m "article: $(date +%Y-%m-%d)"
          git push

      - name: Open issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EVENT_NAME: ${{ github.event_name }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          DATE=$(date -u +%Y-%m-%d)
          TITLE="Weekly pipeline failure on ${DATE}"
          SUMMARY="(no run summary produced)"
          if [ -f outputs/run_summary.json ]; then
            SUMMARY=$(cat outputs/run_summary.json)
          fi
          BODY=$(cat <<EOF
          The weekly pipeline run failed.

          - Run: ${RUN_URL}
          - Triggered by: ${EVENT_NAME}
          - Commit: ${COMMIT_SHA}

          Common failure modes:
          - OpenAI hiccup (re-run the workflow)
          - Codegen omit (inspect \`outputs/codegen/*.json\` diagnostics_excerpt)
          - Editorial gate quarantine
          - Forced topic/family input invalid

          Run summary (if any):
          \`\`\`json
          ${SUMMARY}
          \`\`\`

          Auto-created by the pipeline failure handler in \`.github/workflows/weekly.yml\`.
          EOF
          )
          # Ensure the label exists; ignore errors so a duplicate-create doesn't fail the step.
          gh label create pipeline-failure --color "d93f0b" --description "Auto-created by the pipeline failure handler" 2>/dev/null || true
          gh issue create \
            --title "${TITLE}" \
            --body "${BODY}" \
            --label pipeline-failure
