name: Weekly iOS Article Generator

on:
  # Run automatically every Monday, Wednesday, and Friday at 10:00 UTC.
  schedule:
    - cron: "0 10 * * 1,3,5"
  # Also allow manual runs from the GitHub Actions tab.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-article:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai "python-dotenv>=1.2.1,<2" "requests>=2.32.5,<3" "feedparser>=6.0.12,<7"

      - name: Generate weekly article
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-5-mini
          OPENAI_TEMPERATURE: "0.7"
        run: python main.py

      - name: Publish articles to content repo
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          git clone https://x-access-token:${DEPLOY_TOKEN}@github.com/saurabhdave/ios-ai-articles.git _content
          cp -r outputs/articles/.    _content/articles/    || true
          cp -r outputs/linkedin/.    _content/linkedin/    || true
          cp -r outputs/codegen/.     _content/codegen/     || true
          cp -r outputs/newsletter/.  _content/newsletter/  || true
          cd _content
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add articles/ linkedin/ codegen/ newsletter/
          git diff --staged --quiet || git commit -m "article: $(date +%Y-%m-%d)"
          git push

      - name: Commit and push generated content
        run: |
          if [ -n "$(git status --porcelain outputs/articles outputs/trends outputs/linkedin outputs/codegen)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add outputs/articles outputs/trends outputs/linkedin outputs/codegen
            git commit -m "chore: add weekly generated iOS content"
            git push
          else
            echo "No new generated content changes to commit."
          fi
