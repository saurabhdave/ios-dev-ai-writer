name: Weekly iOS Article Generator

on:
  # Run automatically every Monday and Thursday at 10:00 UTC.
  schedule:
    - cron: "0 10 * * 1,4"
    # WWDC daily cadence: the remaining five days. The wwdc-gate job lets
    # these runs through only inside the WWDC_START_DATE..WWDC_END_DATE
    # window, so the rest of the year they are skipped within seconds.
    - cron: "0 10 * * 0,2,3,5,6"
  # Also allow manual runs from the GitHub Actions tab, with override knobs.
  workflow_dispatch:
    inputs:
      forced_topic:
        description: "Override the generated title (max 60 chars). Leave blank to let the pipeline decide."
        type: string
        required: false
        default: ""
      forced_family:
        description: "Force a topic family. 'auto' = use the weighted sampler."
        type: choice
        required: false
        default: auto
        options:
          - auto
          - architecture
          - performance
          - concurrency
          - swiftui_features
          - tooling_debugging
          - frameworks_apis
          - accessibility_design
          - migration
      dry_run:
        description: "Run the pipeline but skip git persistence and publishing to the content repo."
        type: boolean
        required: false
        default: false
      multi_per_day:
        description: "Keep existing same-date articles instead of replacing them (publish several articles in one day)."
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  issues: write

# WWDC window — update these two dates once a year when Apple announces the
# conference (never auto-guessed). Inside the window the pipeline runs daily
# and topic generation switches to WWDC announcement coverage.
env:
  WWDC_START_DATE: "2026-06-08"
  WWDC_END_DATE: "2026-06-12"

jobs:
  wwdc-gate:
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.gate.outputs.proceed }}
    steps:
      - name: Decide whether this run proceeds
        id: gate
        run: |
          proceed=true
          # Only the daily WWDC cron is gated; Mon/Thu and manual runs always proceed.
          if [ "${{ github.event_name }}" = "schedule" ] && [ "${{ github.event.schedule }}" = "0 10 * * 0,2,3,5,6" ]; then
            today=$(date -u +%F)
            if [ -z "$WWDC_START_DATE" ] || [ -z "$WWDC_END_DATE" ] \
               || [ "$today" \< "$WWDC_START_DATE" ] || [ "$today" \> "$WWDC_END_DATE" ]; then
              proceed=false
            fi
          fi
          echo "proceed=$proceed" >> "$GITHUB_OUTPUT"
          echo "Gate decision: proceed=$proceed (event=${{ github.event_name }}, schedule='${{ github.event.schedule }}')"

  generate-article:
    # macOS so swiftc + the iOS/macOS/watchOS SDKs are available: the code agent's
    # stub-tolerant type-check (CODEGEN_VALIDATION_MODE=compile) only catches API
    # misuse when it can compile against an Apple SDK. On ubuntu swiftc is absent
    # and every Swift validator silently no-ops.
    runs-on: macos-latest
    needs: wwdc-gate
    if: needs.wwdc-gate.outputs.proceed == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Generate weekly article
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-5
          OPENAI_TEMPERATURE: "0.7"
          # Authenticates the cross-repo dedup fetch (_load_published_titles) —
          # unauthenticated GitHub API calls share a 60/hr per-IP limit that
          # Actions runner pools exhaust, silently disabling the dedup check.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Manual overrides from workflow_dispatch. Empty / "auto" means no override.
          FORCED_TOPIC: ${{ github.event.inputs.forced_topic }}
          FORCED_FAMILY: ${{ github.event.inputs.forced_family }}
        run: python main.py

      - name: Write run summary
        if: always()
        run: |
          python - <<'EOF'
          import json, os
          summary_path = "outputs/run_summary.json"
          if not os.path.exists(summary_path):
              print("No run summary found.")
              exit(0)
          with open(summary_path) as f:
              s = json.load(f)
          dash = "\u2014"
          lines = [
              f"## Pipeline run \u2014 {s.get('date', 'unknown')}",
              "| Field | Value |",
              "|---|---|",
              f"| Topic | {s.get('topic') or dash} |",
              f"| Word count | {s.get('article_word_count') or dash} |",
              f"| Codegen path | {s.get('codegen_path') or dash} |",
              f"| Repair attempts | {s.get('codegen_repair_attempts', 0)} |",
              f"| Editor passes | {s.get('editor_passes', 0)} |",
              f"| Voice pass | {'yes' if s.get('voice_pass') else 'no'} |",
              f"| Newsletter | {'yes' if s.get('newsletter_enabled') else 'no'} |",
              f"| Quarantine | {'triggered' if s.get('quarantine_triggered') else 'clean'} |",
          ]
          md = "\n".join(lines) + "\n"
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
              f.write(md)
          print("Summary written.")
          EOF

      - name: Regenerate Pipeline Health section in README
        if: github.event.inputs.dry_run != 'true'
        run: python scripts/update_readme.py

      - name: Commit and push generated content
        id: persist-state
        if: github.event.inputs.dry_run != 'true'
        run: |
          CHANGED_FILES=""
          if [ -n "$(git status --porcelain .newsletter_issue_number)" ]; then
            CHANGED_FILES="${CHANGED_FILES} .newsletter_issue_number"
          fi
          if [ -n "$(git status --porcelain outputs/quality_history.json)" ]; then
            CHANGED_FILES="${CHANGED_FILES} outputs/quality_history.json"
          fi
          if [ -n "$(git status --porcelain outputs/quality_history_meta.json)" ]; then
            CHANGED_FILES="${CHANGED_FILES} outputs/quality_history_meta.json"
          fi
          if [ -n "$(git status --porcelain memory/family_picks.json)" ]; then
            CHANGED_FILES="${CHANGED_FILES} memory/family_picks.json"
          fi
          if [ -n "$(git status --porcelain README.md)" ]; then
            CHANGED_FILES="${CHANGED_FILES} README.md"
          fi
          if [ -n "${CHANGED_FILES}" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -f ${CHANGED_FILES}
            git commit -m "chore: persist newsletter counter, quality history, family rotation, and pipeline health"
            git pull --rebase
            git push
          else
            echo "No state files changed."
          fi

      - name: Check pipeline health
        id: health
        if: github.event.inputs.dry_run != 'true'
        continue-on-error: true
        run: python scripts/health_check.py

      - name: File health-regression issue
        if: steps.health.outcome == 'failure' && github.event.inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Dedupe: if an open issue with this label exists, comment on it instead
          # of filing a new one — prevents two-issues-per-week spam during a regression run.
          EXISTING=$(gh issue list \
            --label pipeline-health-regression \
            --state open \
            --json number \
            --jq 'length')
          gh label create pipeline-health-regression \
            --color "fbca04" \
            --description "Auto-created when the post-run health check trips a threshold" \
            2>/dev/null || true
          if [ "$EXISTING" -gt 0 ]; then
            ISSUE=$(gh issue list --label pipeline-health-regression --state open --json number --jq '.[0].number')
            echo "Open health-regression issue #${ISSUE} already exists; appending today's snapshot."
            gh issue comment "$ISSUE" --body-file outputs/health_regression.md
          else
            gh issue create \
              --title "Pipeline health regression — $(date -u +%Y-%m-%d)" \
              --body-file outputs/health_regression.md \
              --label pipeline-health-regression
          fi

      - name: Publish articles to content repo
        if: steps.persist-state.outcome == 'success' && github.event.inputs.dry_run != 'true'
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          MULTI_PER_DAY: ${{ github.event.inputs.multi_per_day }}
        run: |
          git clone https://x-access-token:${DEPLOY_TOKEN}@github.com/saurabhdave/ios-ai-articles.git _content
          mkdir -p _content/articles _content/linkedin _content/codegen _content/newsletter
          # Copy each artifact type, removing same-date files with a different
          # slug/issue first. A same-date re-run (e.g. workflow_dispatch with a
          # new forced topic) replaces the article — the LinkedIn post, codegen
          # metadata, and newsletter issue from the replaced topic must go with
          # it, or the content repo ends up with artifacts for different topics
          # on the same date (observed: orphaned 2026-03-31 LinkedIn post).
          # Exception: multi_per_day=true keeps same-date artifacts so several
          # articles can be published on one day (e.g. WWDC coverage bursts).
          sync_artifacts() {
            src_dir=$1; dest_dir=$2
            for src in "$src_dir"/*; do
              [ -f "$src" ] || continue
              fname=$(basename "$src")
              case "$fname" in
                *.md|*.html|*.json) ;;
                *) continue ;;
              esac
              date_prefix=$(echo "$fname" | grep -oE '^[0-9]{4}-[0-9]{2}-[0-9]{2}')
              if [ -n "$date_prefix" ] && [ "$MULTI_PER_DAY" != "true" ]; then
                # Compare stems (name minus extension) so paired files of the
                # same artifact (newsletter .md + .html) don't delete each other.
                stem="${fname%.*}"
                for existing in "$dest_dir/${date_prefix}"-*; do
                  [ -f "$existing" ] || continue
                  existing_name=$(basename "$existing")
                  if [ "${existing_name%.*}" != "$stem" ]; then
                    echo "Replacing same-date artifact: $existing_name -> $fname"
                    rm "$existing"
                  fi
                done
              fi
              cp "$src" "$dest_dir/"
            done
          }
          sync_artifacts outputs/articles   _content/articles
          sync_artifacts outputs/linkedin   _content/linkedin
          sync_artifacts outputs/codegen    _content/codegen
          sync_artifacts outputs/newsletter _content/newsletter
          rm -f _content/newsletter/.issue_number
          cd _content
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A articles/ linkedin/ codegen/ newsletter/
          git diff --staged --quiet || git commit -m "article: $(date +%Y-%m-%d)"
          git push

      - name: Open issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EVENT_NAME: ${{ github.event_name }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          DATE=$(date -u +%Y-%m-%d)
          TITLE="Weekly pipeline failure on ${DATE}"
          SUMMARY="(no run summary produced)"
          if [ -f outputs/run_summary.json ]; then
            SUMMARY=$(cat outputs/run_summary.json)
          fi
          BODY=$(cat <<EOF
          The weekly pipeline run failed.

          - Run: ${RUN_URL}
          - Triggered by: ${EVENT_NAME}
          - Commit: ${COMMIT_SHA}

          Common failure modes:
          - OpenAI hiccup (re-run the workflow)
          - Codegen omit (inspect \`outputs/codegen/*.json\` diagnostics_excerpt)
          - Editorial gate quarantine
          - Forced topic/family input invalid

          Run summary (if any):
          \`\`\`json
          ${SUMMARY}
          \`\`\`

          Auto-created by the pipeline failure handler in \`.github/workflows/weekly.yml\`.
          EOF
          )
          # Ensure the label exists; ignore errors so a duplicate-create doesn't fail the step.
          gh label create pipeline-failure --color "d93f0b" --description "Auto-created by the pipeline failure handler" 2>/dev/null || true
          gh issue create \
            --title "${TITLE}" \
            --body "${BODY}" \
            --label pipeline-failure
